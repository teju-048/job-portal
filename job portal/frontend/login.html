<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h2>Login</h2>

    <input
        type="email"
        id="email"
        placeholder="Email"
    >

    <br><br>

    <input
        type="password"
        id="password"
        placeholder="Password"
    >

    <br><br>

    <button onclick="loginUser()">
        Login
    </button>

</div>

<script>

async function loginUser(){

    const data = {

        email:
        document.getElementById(
            "email"
        ).value,

        password:
        document.getElementById(
            "password"
        ).value
    };

    // Validation

    if(
        !data.email ||
        !data.password
    ){

        alert(
            "Please enter email and password"
        );

        return;
    }

    try{

        const response = await fetch(

            "http://127.0.0.1:8000/login",

            {
                method:"POST",

                headers:{
                    "Content-Type":
                    "application/json"
                },

                body:
                JSON.stringify(data)
            }

        );

        const result =
        await response.json();

        alert(result.message);

        if(result.message ===
            "Login Successful"){

            localStorage.setItem(
                "userEmail",
                result.email
            );

            localStorage.setItem(
                "userRole",
                result.role
            );

            localStorage.setItem(
                "candidateName",
                result.name
            );

            window.location.href =
            "dashboard.html";
        }

    }
    catch(error){

        console.error(error);

        alert(
            "Server Error. Please try again."
        );

    }

}

</script>

</body>
</html>
