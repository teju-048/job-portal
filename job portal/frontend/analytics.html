<!DOCTYPE html>
<html>

<head>
    <title>Analytics Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>📊 Analytics Dashboard</h1>

        <div class="analytics-grid">

            <div class="analytics-card">
                <h2 id="jobs">0</h2>
                <p>Total Jobs Posted</p>
            </div>

            <div class="analytics-card">
                <h2 id="candidates">0</h2>
                <p>Total Candidates</p>
            </div>

            <div class="analytics-card">
                <h2 id="matches">0</h2>
                <p>Successful Matches</p>
            </div>

            <div class="analytics-card">
                <h2 id="reliability">0</h2>
                <p>Average Reliability Score</p>
            </div>

            <div class="analytics-card">
                <h2 id="skill">-</h2>
                <p>Top Skill</p>
            </div>

            <div class="analytics-card">
                <h2 id="recommendations">0</h2>
                <p>Recommended Jobs Generated</p>
            </div>

        </div>

    </div>

    <script>

        async function loadAnalytics() {

            try {

                const response = await fetch(
                    "http://127.0.0.1:8000/analytics"
                );

                const result = await response.json();

                document.getElementById("jobs").innerHTML =
                    result.total_jobs || 0;

                document.getElementById("candidates").innerHTML =
                    result.total_candidates || 0;

                document.getElementById("matches").innerHTML =
                    result.successful_matches || result.total_applications || 0;

                document.getElementById("reliability").innerHTML =
                    result.average_reliability_score || 85;

                document.getElementById("skill").innerHTML =
                    result.top_skill || "Python";

                document.getElementById("recommendations").innerHTML =
                    result.recommended_jobs_generated || 0;

            }
            catch (error) {

                console.error(
                    "Analytics Error:",
                    error
                );

            }

        }

        loadAnalytics();

    </script>

</body>

</html>
